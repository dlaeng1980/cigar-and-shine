<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cigar & Shine — QR Code</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap');
  
  body {
    background: #0d1a0d;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Montserrat', sans-serif;
  }

  .card {
    background: #1a2a1a;
    border: 2px solid #c9a84c;
    border-radius: 16px;
    padding: 40px 48px;
    text-align: center;
    max-width: 420px;
    width: 90%;
    box-shadow: 0 0 60px rgba(201,168,76,0.15);
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: #c9a84c;
    letter-spacing: 3px;
    margin-bottom: 4px;
  }

  .sub {
    font-size: 10px;
    color: #c9a84c88;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .slogan {
    font-size: 12px;
    color: #a09070;
    font-style: italic;
    margin-bottom: 28px;
    line-height: 1.6;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #c9a84c44, transparent);
    margin: 20px 0;
  }

  #qrcode {
    display: flex;
    justify-content: center;
    margin: 24px 0;
  }

  #qrcode canvas, #qrcode img {
    border-radius: 8px;
    border: 6px solid #e8e0d0;
  }

  .scan-text {
    font-size: 13px;
    color: #c9a84c;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .url-text {
    font-size: 11px;
    color: #a09070;
    margin-bottom: 24px;
  }

  .steps {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
  }

  .step {
    text-align: center;
  }

  .step-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #c9a84c22;
    border: 1px solid #c9a84c66;
    color: #c9a84c;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 6px;
  }

  .step-lbl {
    font-size: 9px;
    color: #a09070;
    line-height: 1.4;
  }

  .footer-note {
    font-size: 9px;
    color: #a09070;
    margin-top: 20px;
    line-height: 1.6;
    opacity: 0.7;
  }
</style>
</head>
<body>
<div class="card">
  <div class="brand">CIGAR & SHINE</div>
  <div class="sub">Premium Carwash Concierge</div>
  <div class="slogan">Ihr Genuss hat Vorrang.<br>Wir kümmern uns um den Glanz.</div>
  
  <div class="divider"></div>
  
  <div class="scan-text">&#x2193; QR-Code scannen</div>
  <div id="qrcode"></div>
  <div class="url-text">cigar-and-shine.ch</div>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-lbl">Programm<br>wählen</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-lbl">Schlüssel<br>an der Bar</div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-lbl">Zigarre<br>geniessen</div>
    </div>
  </div>

  <div class="footer-note">
    Exklusiv für Gäste von Don Alejandro's, Dietlikon<br>
    Handwäsche · Abholung bis 17:30 Uhr
  </div>
</div>

<script>
new QRCode(document.getElementById("qrcode"), {
  text: "https://cigar-and-shine.ch",
  width: 220,
  height: 220,
  colorDark: "#0d1a0d",
  colorLight: "#e8e0d0",
  correctLevel: QRCode.CorrectLevel.H
});
</script>
</body>
</html>
